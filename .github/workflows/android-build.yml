name: Android Production Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'Bug fixes and performance improvements'
        type: string

jobs:
  build-and-deploy:
    name: Build and Deploy to Internal Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli
      
    - name: Install dependencies
      run: npm install
      
    - name: Authenticate with Expo
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      run: |
        if [ -z "$EXPO_TOKEN" ]; then
          echo "EXPO_TOKEN is not set"
          exit 1
        fi
        echo "EXPO_TOKEN=$EXPO_TOKEN" >> $GITHUB_ENV
        eas whoami || exit 1
      
    - name: Build Production AAB
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      run: |
        eas build --platform android --profile production-aab --non-interactive \
        --version-scheme bump \
        --message "${{ github.event.inputs.release_notes || 'Automated production build' }}"
        
    - name: Download build artifact
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      run: |
        # Find the most recent build
        BUILD_PATH=$(eas build:list --platform=android --limit=1 --status=finished --json | jq -r '.[0].artifacts[0].path')
        eas download --path="${BUILD_PATH}" --output="app-release.aab"
        
    - name: Deploy to Play Console Internal Testing
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_JSON_KEY }}
        packageName: com.gogrowsmart.app.mobile
        releaseFiles: app-release.aab
        track: internal
        status: completed
        releaseNotes: "${{ github.event.inputs.release_notes || 'Bug fixes and performance improvements' }}"
        whatsNewDirectory: whatsnew
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: production-aab
        path: app-release.aab
        retention-days: 30

  development-build:
    name: Build Development APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli
      
    - name: Install dependencies
      run: npm install
      
    - name: Build Development APK
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      run: eas build --platform android --profile development --non-interactive
      
    - name: Upload Development APK
      uses: actions/upload-artifact@v4
      with:
        name: development-apk
        path: "*.apk"
        retention-days: 7
